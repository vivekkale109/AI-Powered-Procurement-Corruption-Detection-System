name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: |
          ruff check api src reports dashboard tests benchmarks --select E9,F63,F7,F82

      - name: Unit and integration tests
        run: |
          python -m unittest discover -s tests -p 'test_*.py'

      - name: Benchmark regression guardrail
        run: |
          python -m benchmarks.regression --dataset data/benchmarks/tender_regression_dataset.csv --baseline benchmarks/risk_score_baseline.json

      - name: Docker build
        run: |
          docker build -t procurement-corruption-detector:ci .
