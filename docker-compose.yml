version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: procurement-api
    command: ["python", "api/app.py"]
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/api/v1/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: procurement-dashboard
    command:
      - streamlit
      - run
      - dashboard/app.py
      - --server.address=0.0.0.0
      - --server.port=8501
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
      - API_BASE_URL=http://api:5000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 25s

  db:
    image: postgres:13
    container_name: procurement-db
    environment:
      - POSTGRES_DB=procurement
      - POSTGRES_PASSWORD=secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d procurement || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
