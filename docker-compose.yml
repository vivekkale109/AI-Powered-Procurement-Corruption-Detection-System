"""
Docker Compose configuration for multi-service deployment.
"""

version: '3.8'

services:
  # Web dashboard
  dashboard:
    build: .
    container_name: procurement-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
    command: streamlit run dashboard/app.py

  # Analytics backend (future)
  api:
    build: .
    container_name: procurement-api
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - FLASK_APP=api/app.py
      - FLASK_ENV=production
    depends_on:
      - db

  # Database (PostgreSQL for large-scale deployment)
  db:
    image: postgres:13
    container_name: procurement-db
    environment:
      - POSTGRES_DB=procurement
      - POSTGRES_PASSWORD=secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
