# Configuration for Procurement Corruption Detection System

# System Settings
system:
  name: "Procurement Corruption Detection System"
  version: "1.0.0"
  model_version: "1.0.0"
  config_version: "2026-03-04.1"
  environment: "development"
  debug: true

# Data Settings
data:
  input_path: "data/raw"
  output_path: "data/processed"
  processed_cache: "data/cache"
  max_file_size_mb: 500

# Preprocessing Settings
preprocessing:
  normalize_contractor_names: true
  similarity_threshold: 0.85  # For fuzzy matching
  handle_missing_values: true
  missing_value_strategy: "mean"  # mean, median, drop
  remove_duplicates: true

# Feature Engineering Settings
features:
  compute_win_frequency: true
  compute_bid_deviations: true
  compute_participation_patterns: true
  compute_time_intervals: true
  compute_geographic_concentration: true
  time_window_days: 365  # Annual analysis window

# Anomaly Detection Settings
anomaly_detection:
  isolation_forest:
    enabled: true
    contamination: 0.05  # Expected proportion of anomalies
    n_estimators: 100
    max_samples: "auto"
    random_state: 42

  local_outlier_factor:
    enabled: true
    n_neighbors: 20
    contamination: 0.05
    algorithm: "auto"

  statistical:
    enabled: true
    z_score_threshold: 3.0  # Standard deviations
    iqr_multiplier: 1.5

# Risk Scoring Settings
risk_scoring:
  tender_risk_factors:
    price_anomaly:
      weight: 0.20
    winner_concentration:
      weight: 0.25
    participation_anomaly:
      weight: 0.18
    network_suspicion:
      weight: 0.20
    temporal_pattern:
      weight: 0.17

  contractor_risk_factors:
    win_concentration:
      weight: 0.25
    geographic_concentration:
      weight: 0.17
    department_concentration:
      weight: 0.18
    network_centrality:
      weight: 0.20
    rotation_pattern:
      weight: 0.20

  department_risk_factors:
    anomaly_concentration:
      weight: 0.25
    winner_diversity:
      weight: 0.25
    price_inflation:
      weight: 0.20
    network_density:
      weight: 0.15

  risk_thresholds:
    tender_level:
      critical: 0.85
      high: 0.70
      medium: 0.40
      low: 0.15
    contractor_level:
      critical: 0.80
      high: 0.65
      medium: 0.40
      low: 0.15
    department_level:
      critical: 0.75
      high: 0.60
      medium: 0.40
      low: 0.20

  constants:
    tender_price_zscore_divisor: 3.0
    contractor_win_rate_multiplier: 1.5
    network_betweenness_weight: 0.7
    department_anomaly_threshold: 0.5
    department_winner_hhi_normalizer: 0.3
    department_expected_bidders_per_tender: 3
    price_ratio_expected_baseline: 1.0
    department_complaint_history_placeholder: 0.05

# Model Reliability & Calibration
model_reliability:
  tune_contamination: true
  contamination_candidates: [0.01, 0.03, 0.05, 0.08, 0.1, 0.12, 0.15, 0.2]
  calibration_enabled: true
  # Optional supervised label column, e.g., is_corrupt / fraud_label / investigated_flag
  label_column: null
  # If no true labels are available, use weak-label heuristics
  use_weak_labels: true

# Network Analysis Settings
network_analysis:
  min_participation_threshold: 3  # Minimum bids to be in network
  temporal_window_days: 730  # 2-year window for co-participation
  detect_communities: true
  community_algorithm: "louvain"  # or "modularity"
  minimum_edge_weight: 2  # Minimum co-participated tenders

# Dashboard Settings
dashboard:
  host: "localhost"
  port: 8501
  theme: "light"
  enable_caching: true
  cache_ttl_minutes: 60

# Database Settings
database:
  enabled: false
  backend: "postgresql"  # postgresql, mysql, sqlite
  hostname: "localhost"
  port: 5432
  database: "procurement_db"
  username: "user"
  password: ""
  
# Report Settings
reports:
  output_format: ["html", "pdf"]
  include_visualizations: true
  include_network_graphs: true
  max_top_items: 10
  confidentiality_level: "internal"

# Logging
logging:
  level: "INFO"
  format: "json"
  output_file: "logs/system.log"
  max_file_size_mb: 100
  backup_count: 5
